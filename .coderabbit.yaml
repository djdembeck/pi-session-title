language: 'en-US'

reviews:
  profile: 'assertive'
  high_level_summary: true
  poem: false
  review_status: true
  review_details: true
  fail_commit_status: true
  in_progress_fortune: false
  auto_apply_labels: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop
  path_instructions:
    - path: '**/*'
      instructions: |
        Please review focusing on:
        - Code quality and consistency with existing patterns
        - Adherence to TypeScript/Node.js best practices
        - Test coverage for any new code
        - Security implications of changes
        - Performance considerations
        - Documentation updates where needed

        This project follows standard TypeScript/Node.js repository standards. Please ensure:
        - Conventional commit format is followed
        - Unit tests are included with proper coverage
        - No breaking changes are introduced without proper discussion
        - TypeScript code follows strict type checking (strict: true)
        - Errors are handled explicitly and wrapped with context
        - Extension API patterns are followed for Pi integration
  pre_merge_checks:
    description:
      mode: 'error'
    title:
      mode: 'error'
      requirements: 'Use conventional commits format: type(scope)?: description (scope is optional)'
    issue_assessment:
      mode: 'warning'
    custom_checks:
      - mode: 'error'
        name: 'TypeScript strict compliance'
        instructions: 'PR must pass typecheck (tsc --noEmit) and follow strict TypeScript patterns'
  tools:
    eslint:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
